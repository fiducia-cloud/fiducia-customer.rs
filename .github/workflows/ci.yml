# CI: fmt, clippy, unit tests (--bins), and audit. Checks out the sibling
# fiducia-interfaces repo so the path-dependency crates resolve.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: repo
          submodules: recursive
      # The crate depends on sibling path crates under fiducia-interfaces
      # (../fiducia-interfaces/generated/rust and .../generated/rust-db), so the
      # interfaces repo must sit alongside for cargo to resolve them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: repo
      - name: CLI flag contract
        working-directory: repo
        run: |
          make -B -C vendor/flags-2-env all
          vendor/flags-2-env/build/flags2env audit .cli-flags.toml
      - name: fmt
        working-directory: repo
        run: cargo fmt --check
        continue-on-error: true
      - name: clippy
        working-directory: repo
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
      - name: test
        working-directory: repo
        # Bin-only crate (no lib.rs): `--lib` would error with "no library targets
        # found", so run the in-binary unit tests with `--bins` (the gating step).
        run: cargo test --bins
      - name: audit
        working-directory: repo
        run: |
          cargo install cargo-audit --locked || true
          cargo audit
        continue-on-error: true

# CI: fmt, clippy, unit tests (--bins), and audit. Checks out the sibling
# fiducia-interfaces repo so the path-dependency crates resolve.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: repo
          submodules: recursive
      # The crate depends on sibling path crates under fiducia-interfaces
      # (../fiducia-interfaces/generated/rust and .../generated/rust-db), so the
      # interfaces repo must sit alongside for cargo to resolve them.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          ref: 487e470c45ab5851e8f6f3b1dc048fe067fbf408
          path: fiducia-interfaces
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.97.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: repo
      - name: CLI flag contract
        working-directory: repo
        run: |
          make -B -C vendor/flags-2-env all
          vendor/flags-2-env/build/flags2env audit .cli-flags.toml
      - name: fmt
        working-directory: repo
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: repo
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: test
        working-directory: repo
        run: cargo test --locked --all-targets --all-features
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit@0.22.2
      - name: audit
        working-directory: repo
        run: cargo audit

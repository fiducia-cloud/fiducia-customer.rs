[package]
name = "fiducia-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
maud = { version = "0.26", features = ["axum"] }
async-stream = "0.3"
tower-http = { version = "0.5", features = ["trace", "fs", "timeout", "limit", "catch-panic", "set-header"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Shared OpenTelemetry + tracing setup (one init() for all services).
fiducia-telemetry = { git = "https://github.com/fiducia-cloud/fiducia-telemetry.rs", tag = "v0.1.0" }

# Shared API payload/error contract (generated from fiducia-interfaces schemas) —
# the one source of truth for the types every fiducia service speaks.
fiducia-interfaces = { path = "../fiducia-interfaces/generated/rust" }

[dev-dependencies]
# `ServiceExt::oneshot` drives the router in tests without binding a socket.
tower = { version = "0.5", features = ["util"] }

[package]
name = "fiducia-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.7", features = ["ws"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# CSPRNG for demo API-key secrets — never hand out a predictable, timestamp-
# derived credential from the customer portal.
getrandom = "0.2"
maud = { version = "0.26", features = ["axum"] }
async-stream = "0.3"
tower-http = { version = "0.5", features = ["trace", "fs", "timeout", "limit", "catch-panic", "set-header"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Shared OpenTelemetry + tracing setup (one init() for all services).
fiducia-telemetry = { git = "https://github.com/fiducia-cloud/fiducia-telemetry.rs", tag = "v0.1.0" }

# Shared API payload/error contract (generated from fiducia-interfaces schemas) —
# the one source of truth for the types every fiducia service speaks.
fiducia-interfaces = { path = "../fiducia-interfaces/generated/rust" }

# Generated sqlx::FromRow row types for the customer Postgres plane. The api_keys
# vertical reads/writes these against the customer DB when DATABASE_URL is set.
fiducia-interfaces-db = { path = "../fiducia-interfaces/generated/rust-db" }

# The local-first sync protocol core (native build, no wasm). The server builds
# its `fiducia:sync` change frames and write-acks from THESE types, so the backend
# and the @fiducia/sync browser client share exactly one protocol definition.
fiducia-sync-core = { path = "../fiducia-sync" }

# SQLx for the DB-backed api_keys handlers. Runtime-checked queries (query_as, not
# the compile-time macros) so `cargo build` needs no live DB. `json` decodes the
# scopes jsonb column carried by ApiKeysRow.
sqlx = { version = "0.8", features = [
    "postgres",
    "runtime-tokio-rustls",
    "uuid",
    "chrono",
    "json",
    "macros",
] }
uuid = { version = "1", features = ["serde", "v4"] }
# Never persist a raw API-key secret — store only a SHA-256 hash of it.
sha2 = "0.10"

[dev-dependencies]
# `ServiceExt::oneshot` drives the router in tests without binding a socket.
tower = { version = "0.5", features = ["util"] }
